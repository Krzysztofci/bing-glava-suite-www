name: Update Activity Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: activity-feed
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_activity.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --exit-code index.html; then
            git add index.html
            git commit -m "chore: update activity feed [skip ci]"
            git push origin main
          else
            echo "No changes → exit"
          fi
