name: Automatyczny Bot Aktualizacji Stopki

on:
  schedule:
    - cron: '0 * * * *'  # Odpalaj równo co godzinę
  workflow_dispatch:      # Pozwala też odpalić bota ręcznie z zakładki "Actions"

permissions:
  contents: write # Daje botowi prawo do zapisu na branchu www

jobs:
  update-footer:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium z gałęzi www
        uses: actions/checkout@v4
        with:
          ref: www # <--- KLUCZOWE: Wskazanie Twojej gałęzi ze stroną

      - name: Konfiguracja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Uruchom skrypt bota
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_activity.py

      - name: Commit i Push zmian na branch www
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sprawdź czy zaszły jakieś zmiany w index.html
          if ! git diff --exit-code index.html; then
            git add index.html
            git commit -m "chore: automated footer activity sync [skip ci]"
            git push origin www # <--- Pchamy bezpośrednio na branch www
          else
            echo "Brak nowych aktywności, index.html jest aktualny."
          fi
